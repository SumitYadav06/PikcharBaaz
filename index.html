<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stream Pro - Watch Your Favorite Streams</title>
<meta name="description" content="Stream Pro is the best platform to watch and enjoy your favorite live streams.">
<meta name="keywords" content="Stream Pro, StreamPro app, Sumit Yadav Stream Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro - Ultimate VIP Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === COLOR PALETTE & VARIABLES === */
        :root {
            --bg: #050505;
            --surface: #121212;
            --primary: #E50914; /* Netflix Red */
            --primary-glow: rgba(229, 9, 20, 0.4);
            --text: #ffffff;
            --text-dim: #9ca3af;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* === RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }
        ::-webkit-scrollbar { display: none; }

        /* === OFFLINE SCREEN (NO DINOSAUR) === */
        #offlineScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #offlineScreen i { font-size: 60px; color: var(--primary); margin-bottom: 20px; animation: pulse 2s infinite; }
        #offlineScreen h1 { font-size: 24px; margin-bottom: 10px; }
        #offlineScreen p { color: var(--text-dim); font-size: 14px; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* === NAVBAR === */
        nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: var(--transition); }
        nav.scrolled { background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .search-box { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 8px 20px; width: 45%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); }
        .search-box:focus-within { background: rgba(255,255,255,0.15); border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .search-box input { background: transparent; border: none; color: white; outline: none; width: 100%; padding: 0 10px; font-size: 14px; }
        .voice-btn { color: var(--primary); cursor: pointer; font-size: 18px; }

        /* === HERO BANNER === */
        .hero { height: 70vh; position: relative; display: flex; align-items: flex-end; padding: 50px 5%; background-size: cover; background-position: center; transition: background-image 0.5s ease; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 80%), linear-gradient(to right, rgba(0,0,0,0.9) 0%, transparent 100%); }
        .hero-content { position: relative; z-index: 10; max-width: 600px; animation: fadeInUp 1s ease; }
        .hero-title { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 10px; text-shadow: 2px 2px 10px black; }
        .hero-meta { display: flex; gap: 15px; font-size: 14px; color: #ccc; margin-bottom: 15px; font-weight: 500; }
        .hero-desc { font-size: 14px; line-height: 1.6; color: #ddd; margin-bottom: 25px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* === CATEGORY BUTTONS === */
        .category-bar { display: flex; gap: 12px; overflow-x: auto; padding: 20px 5% 10px; margin-top: -20px; position: relative; z-index: 20; }
        .cat-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: var(--transition); backdrop-filter: blur(5px); }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); border-color: var(--primary); font-weight: 600; box-shadow: 0 0 10px var(--primary-glow); }

        /* === MOVIE GRID === */
        .container { padding: 20px 5% 100px; }
        .section-title { font-size: 22px; font-weight: 600; margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        
        .card { border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; aspect-ratio: 2/3; background: var(--surface); transition: var(--transition); }
        .card:hover { transform: translateY(-8px) scale(1.02); z-index: 2; box-shadow: 0 15px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; opacity: 0; transition: var(--transition); }
        .card:hover .card-info { opacity: 1; }
        .card-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-rating { font-size: 11px; color: gold; margin-top: 3px; font-weight: 600; }

        /* Infinite Scroll Loader */
        .loader { text-align: center; padding: 40px; color: var(--primary); display: none; }

        /* === PREMIUM DETAILS MODAL === */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; display: none; overflow-y: auto; align-items: flex-end; justify-content: center; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content { background: var(--surface); width: 100%; max-width: 900px; border-radius: 20px 20px 0 0; position: relative; overflow: hidden; animation: slideUp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        @media(min-width: 768px) { .modal { align-items: center; } .modal-content { border-radius: 20px; max-height: 90vh; overflow-y: auto; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .close-btn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 20; color: white; font-size: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .m-hero { width: 100%; height: 350px; position: relative; }
        .m-hero img { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to bottom, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%); }
        
        .m-body { padding: 0 30px 40px; margin-top: -100px; position: relative; z-index: 10; }
        .m-title { font-size: 32px; font-weight: 800; text-shadow: 2px 2px 5px black; margin-bottom: 5px; }
        .m-tags { font-size: 13px; color: var(--text-dim); margin-bottom: 25px; }
        
        /* === VIP PLAY BUTTON === */
        .btn-play-vip { width: 100%; background: linear-gradient(45deg, #E50914, #b81d24); color: white; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 12px; box-shadow: 0 10px 20px var(--primary-glow); margin-bottom: 20px; transition: var(--transition); letter-spacing: 1px; }
        .btn-play-vip:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(229, 9, 20, 0.6); }

        .action-btns { display: flex; gap: 15px; margin-bottom: 30px; }
        .action-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: var(--transition); }
        .action-btn:hover { background: rgba(255,255,255,0.1); }

        .m-story { font-size: 14px; line-height: 1.7; color: #ccc; margin-bottom: 30px; }

        /* Cast & Similar Horizontal Scroll */
        .h-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .cast-card { text-align: center; width: 80px; flex-shrink: 0; }
        .cast-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 5px; }
        .cast-card p { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }

        .sim-card { width: 120px; flex-shrink: 0; border-radius: 8px; overflow: hidden; cursor: pointer; transition: var(--transition); }
        .sim-card img { width: 100%; height: 180px; object-fit: cover; }
        .sim-card:hover { transform: scale(1.05); }

        /* === BOTTOM NAV (MOBILE APP FEEL) === */
        .bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); padding: 12px 0; z-index: 100; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); font-size: 11px; gap: 4px; cursor: pointer; transition: var(--transition); }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; }

        @media (max-width: 768px) {
            .hero { height: 60vh; }
            .hero-title { font-size: 2.5rem; }
            .search-box { width: 200px; }
            .bottom-nav { display: flex; }
            .container { padding-bottom: 80px; }
            .m-body { padding: 0 20px 30px; }
        }
    </style>
</head>
<body>

    <!-- OFFLINE SCREEN (No Dinosaur) -->
    <div id="offlineScreen">
        <i class="fa-solid fa-wifi-slash"></i>
        <h1>No Internet Connection</h1>
        <p>Please check your network settings and try again.</p>
    </div>

    <!-- NAVBAR -->
    <nav id="navbar">
        <div class="logo" onclick="loadHome()"><i class="fa-solid fa-play"></i> StreamPro</div>
        <div class="search-box">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="searchInput" placeholder="Movies, Shows, Actors...">
            <i class="fa-solid fa-microphone voice-btn" id="voiceBtn"></i>
        </div>
    </nav>

    <!-- HERO BANNER -->
    <div class="hero" id="heroBanner">
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">...</h1>
            <div class="hero-meta" id="heroMeta">...</div>
            <p class="hero-desc" id="heroDesc">Loading amazing content...</p>
            <button class="btn-play-vip" id="heroBtn" style="width: auto; padding: 12px 30px; font-size: 16px;"><i class="fa-solid fa-play"></i> Watch Now</button>
        </div>
    </div>

    <!-- CATEGORIES -->
    <div class="category-bar">
        <div class="cat-btn active" onclick="loadHome()">Trending</div>
        <div class="cat-btn" onclick="fetchCategory(28, 'Action Blockbusters')">Action</div>
        <div class="cat-btn" onclick="fetchCategory(35, 'Comedy Hits')">Comedy</div>
        <div class="cat-btn" onclick="fetchCategory(27, 'Horror Movies')">Horror</div>
        <div class="cat-btn" onclick="fetchCategory('IN', 'Indian Superhits')">Bollywood/South</div>
    </div>

    <!-- MAIN GRID -->
    <div class="container">
        <h2 class="section-title" id="sectionTitle">Trending Now</h2>
        <div class="grid" id="mainGrid"></div>
        <div class="loader" id="loader"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i></div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="loadHome()"><i class="fa-solid fa-house"></i> Home</div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()"><i class="fa-solid fa-search"></i> Search</div>
        <div class="nav-item" onclick="showWatchlist()"><i class="fa-solid fa-bookmark"></i> Watchlist</div>
        <div class="nav-item" onclick="showHistory()"><i class="fa-solid fa-clock-rotate-left"></i> History</div>
    </div>

    <!-- PREMIUM DETAILS MODAL -->
    <div class="modal" id="movieModal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()"><i class="fa-solid fa-times"></i></div>
            <div class="m-hero"><img src="" id="mBackdrop"></div>
            
            <div class="m-body">
                <h2 class="m-title" id="mTitle">Title</h2>
                <div class="m-tags" id="mTags">...</div>
                
                <!-- VIP PLAY BUTTON (PLAYIMDB ONLY) -->
                <button class="btn-play-vip" id="mPlayBtn">
                    <i class="fa-solid fa-circle-play"></i> WATCH FULL HD
                </button>

                <div class="action-btns">
                    <button class="action-btn" id="mWatchlistBtn"><i class="fa-solid fa-plus"></i> Watchlist</button>
                    <button class="action-btn" onclick="shareMovie()"><i class="fa-solid fa-share-nodes"></i> Share</button>
                </div>

                <h3 style="font-size: 16px; margin-bottom: 10px;">Storyline</h3>
                <p class="m-story" id="mStory">...</p>

                <h3 style="font-size: 16px; margin-bottom: 10px;">Top Cast</h3>
                <div class="h-scroll" id="mCast"></div>

                <h3 style="font-size: 16px; margin-top: 20px; margin-bottom: 10px;">More Like This</h3>
                <div class="h-scroll" id="mSimilar"></div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================
           1. Z+ SECURITY SHIELD
           ========================================== */
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false; // Ctrl+Shift+I/J
            if(e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
        };

        /* ==========================================
           2. OFFLINE / ONLINE DETECTOR
           ========================================== */
        const offlineScreen = document.getElementById('offlineScreen');
        window.addEventListener('offline', () => offlineScreen.style.display = 'flex');
        window.addEventListener('online', () => offlineScreen.style.display = 'none');
        if(!navigator.onLine) offlineScreen.style.display = 'flex';

        /* ==========================================
           3. API & STATE SETUP
           ========================================== */
        const API_KEY = '5e872b180f9dfd43763e70c1eecd0d1a';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/w500';
        const IMG_BG = 'https://image.tmdb.org/t/p/original';

        let currentPage = 1;
        let isFetching = false;
        let currentMode = 'trending'; // trending, search, category, local
        let currentQuery = '';
        let currentMovieData = null; // For modal
        
        let watchlist = JSON.parse(localStorage.getItem('sp_watchlist')) || [];
        let history = JSON.parse(localStorage.getItem('sp_history')) || [];

        const grid = document.getElementById('mainGrid');
        const loader = document.getElementById('loader');

        // Scroll Effect for Navbar
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        async function fetchAPI(url) {
            try {
                const res = await fetch(`${BASE_URL}${url}`);
                if (!res.ok) throw new Error("API Error");
                return await res.json();
            } catch (err) { console.error(err); return null; }
        }

        /* ==========================================
           4. CORE FUNCTIONS (Home, Category, Search)
           ========================================== */
        async function loadHome() {
            currentMode = 'trending';
            currentPage = 1;
            document.getElementById('sectionTitle').innerText = "Trending Now";
            document.getElementById('heroBanner').style.display = 'flex';
            grid.innerHTML = '';
            await fetchAndRender(`/trending/movie/week?api_key=${API_KEY}&page=`, true);
        }

        async function fetchCategory(id, title) {
            currentMode = 'category';
            currentPage = 1;
            currentQuery = id;
            document.getElementById('sectionTitle').innerText = title;
            document.getElementById('heroBanner').style.display = 'none';
            grid.innerHTML = '';
            
            let url = id === 'IN' ? `/discover/movie?api_key=${API_KEY}&with_origin_country=IN&sort_by=popularity.desc&page=` : `/discover/movie?api_key=${API_KEY}&with_genres=${id}&page=`;
            await fetchAndRender(url, false);
        }

        /* --- SEARCH & VOICE SEARCH --- */
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length > 2) {
                searchTimeout = setTimeout(() => {
                    currentMode = 'search';
                    currentQuery = query;
                    currentPage = 1;
                    document.getElementById('sectionTitle').innerText = `Search Results for "${query}"`;
                    document.getElementById('heroBanner').style.display = 'none';
                    grid.innerHTML = '';
                    fetchAndRender(`/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&page=`, false);
                }, 800);
            } else if (query.length === 0) loadHome();
        });

        // Web Speech API for Voice Search
        const voiceBtn = document.getElementById('voiceBtn');
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-IN';
            voiceBtn.onclick = () => { recognition.start(); voiceBtn.style.color = "red"; };
            recognition.onresult = (e) => { 
                document.getElementById('searchInput').value = e.results[0][0].transcript; 
                document.getElementById('searchInput').dispatchEvent(new Event('input')); 
            };
            recognition.onend = () => voiceBtn.style.color = "var(--primary)";
        }

        /* ==========================================
           5. INFINITE SCROLL & RENDERING
           ========================================== */
        async function fetchAndRender(base_url, isHome) {
            if (isFetching) return;
            isFetching = true;
            loader.style.display = 'block';

            const data = await fetchAPI(base_url + currentPage);
            
            if (data && data.results && data.results.length > 0) {
                if (isHome && currentPage === 1) setHeroBanner(data.results[0]);
                
                data.results.forEach(movie => {
                    if(movie.poster_path) grid.appendChild(createCard(movie));
                });
            } else if (currentPage === 1) {
                grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:gray;">No movies found.</p>`;
            }
            
            isFetching = false;
            loader.style.display = 'none';
        }

        function createCard(m) {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<img src="${IMG + m.poster_path}" loading="lazy">
                <div class="card-info"><div class="card-title">${m.title}</div><div class="card-rating">★ ${m.vote_average.toFixed(1)}</div></div>`;
            card.onclick = () => openDetails(m.id);
            return card;
        }

        function setHeroBanner(m) {
            const hero = document.getElementById('heroBanner');
            hero.style.backgroundImage = `url(${IMG_BG + m.backdrop_path})`;
            document.getElementById('heroTitle').innerText = m.title;
            document.getElementById('heroMeta').innerText = `${(m.release_date||'').split('-')[0]} • ★ ${m.vote_average.toFixed(1)}`;
            document.getElementById('heroDesc').innerText = m.overview;
            document.getElementById('heroBtn').onclick = () => openDetails(m.id);
        }

        // Intersection Observer for Infinite Scroll
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isFetching && currentMode !== 'local') {
                currentPage++;
                if(currentMode === 'trending') fetchAndRender(`/trending/movie/week?api_key=${API_KEY}&page=`, true);
                else if(currentMode === 'search') fetchAndRender(`/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(currentQuery)}&page=`, false);
                else if(currentMode === 'category') {
                    let url = currentQuery === 'IN' ? `/discover/movie?api_key=${API_KEY}&with_origin_country=IN&sort_by=popularity.desc&page=` : `/discover/movie?api_key=${API_KEY}&with_genres=${currentQuery}&page=`;
                    fetchAndRender(url, false);
                }
            }
        }, { rootMargin: '100px' });
        observer.observe(loader);

        /* ==========================================
           6. PREMIUM MODAL, CAST, SIMILAR & PLAY
           ========================================== */
        async function openDetails(id) {
            const data = await fetchAPI(`/movie/${id}?api_key=${API_KEY}&append_to_response=credits,similar,external_ids`);
            if(!data) return;

            currentMovieData = data; // Store for Watchlist/History/Share

            document.getElementById('mBackdrop').src = data.backdrop_path ? IMG_BG + data.backdrop_path : IMG + data.poster_path;
            document.getElementById('mTitle').innerText = data.title;
            
            const year = (data.release_date || 'N/A').split('-')[0];
            const genres = data.genres ? data.genres.map(g => g.name).join(', ') : '';
            document.getElementById('mTags').innerText = `${year} • ★ ${data.vote_average.toFixed(1)} • ${data.runtime||0} min • ${genres}`;
            document.getElementById('mStory').innerText = data.overview || "Overview not available.";

            // Cast
            const castDiv = document.getElementById('mCast'); castDiv.innerHTML = '';
            if(data.credits && data.credits.cast) {
                data.credits.cast.slice(0, 10).forEach(c => {
                    if(c.profile_path) castDiv.innerHTML += `<div class="cast-card"><img src="${IMG+c.profile_path}"><p>${c.name}</p></div>`;
                });
            }

            // Similar Movies (No Youtube Trailer, just similar movies)
            const simDiv = document.getElementById('mSimilar'); simDiv.innerHTML = '';
            if(data.similar && data.similar.results) {
                data.similar.results.slice(0, 8).forEach(s => {
                    if(s.poster_path) {
                        const sCard = document.createElement('div'); sCard.className = 'sim-card';
                        sCard.innerHTML = `<img src="${IMG+s.poster_path}">`;
                        sCard.onclick = () => { closeModal(); openDetails(s.id); };
                        simDiv.appendChild(sCard);
                    }
                });
            }

            updateWatchlistBtn();
            saveHistory(data);

            const modal = document.getElementById('movieModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('movieModal').classList.remove('active'); document.body.style.overflow = 'auto'; }

        // THE MAGIC VIP PLAY BUTTON
        document.getElementById('mPlayBtn').addEventListener('click', () => {
            const imdbId = currentMovieData.external_ids ? currentMovieData.external_ids.imdb_id : null;
            if (imdbId) {
                window.open(`https://www.playimdb.com/title/${imdbId}/`, '_blank');
            } else {
                alert("We are sorry! The VIP Server link is not available for this specific title.");
            }
        });

        function shareMovie() {
            const text = `Hey! Check out "${currentMovieData.title}" in HD on StreamPro!`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        /* ==========================================
           7. WATCHLIST & HISTORY (Local Data)
           ========================================== */
        document.getElementById('mWatchlistBtn').addEventListener('click', () => {
            const exists = watchlist.find(m => m.id === currentMovieData.id);
            if(exists) watchlist = watchlist.filter(m => m.id !== currentMovieData.id);
            else watchlist.unshift({id: currentMovieData.id, title: currentMovieData.title, poster_path: currentMovieData.poster_path, vote_average: currentMovieData.vote_average});
            localStorage.setItem('sp_watchlist', JSON.stringify(watchlist));
            updateWatchlistBtn();
        });

        function updateWatchlistBtn() {
            const btn = document.getElementById('mWatchlistBtn');
            const exists = watchlist.find(m => m.id === currentMovieData.id);
            btn.innerHTML = exists ? `<i class="fa-solid fa-check"></i> Added` : `<i class="fa-solid fa-plus"></i> Watchlist`;
            btn.style.background = exists ? "var(--primary)" : "rgba(255,255,255,0.05)";
            btn.style.borderColor = exists ? "var(--primary)" : "rgba(255,255,255,0.1)";
        }

        function saveHistory(data) {
            history = history.filter(m => m.id !== data.id);
            history.unshift({id: data.id, title: data.title, poster_path: data.poster_path, vote_average: data.vote_average});
            if(history.length > 30) history.pop();
            localStorage.setItem('sp_history', JSON.stringify(history));
        }

        function showWatchlist() { renderLocalData("My Watchlist", watchlist); }
        function showHistory() { renderLocalData("Recently Watched", history); }

        function renderLocalData(title, dataArray) {
            currentMode = 'local';
            document.getElementById('heroBanner').style.display = 'none';
            document.getElementById('sectionTitle').innerText = title;
            grid.innerHTML = '';
            if(dataArray.length === 0) grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:gray;">Nothing to show here yet.</p>`;
            else dataArray.forEach(m => { if(m.poster_path) grid.appendChild(createCard(m)); });
        }

        // Initialize App
        loadHome();

    </script>
</body>
